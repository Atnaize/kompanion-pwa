<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Turn your workouts into epic quests with Kompanion" />
    <meta name="theme-color" content="#FF4B00" />

    <!-- PWA Meta Tags -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kompanion" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />

    <!-- Microsoft PWA -->
    <meta name="msapplication-TileColor" content="#FF4B00" />
    <meta name="msapplication-tap-highlight" content="no" />

    <title>Kompanion - Strava Gamification</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('kompanion-settings');
          var stored = null;
          if (raw) {
            var parsed = JSON.parse(raw);
            stored = parsed && parsed.state && parsed.state.theme;
          }
          var isDark;
          if (stored === 'dark') {
            isDark = true;
          } else if (stored === 'light') {
            isDark = false;
          } else {
            isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          }
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
